global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: [api:8000]
  - job_name: pipeline
    static_configs:
      - targets: [pipeline-metrics:9101]
  - job_name: airflow
    static_configs:
      - targets: [airflow-statsd-exporter:9102]
  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
  - job_name: hdfs-namenode
    metrics_path: /prom
    static_configs:
      - targets: [namenode:9870]
  - job_name: hdfs-datanodes
    metrics_path: /prom
    static_configs:
      - targets: [datanode-1:9864, datanode-2:9864]
  - job_name: spark-master
    metrics_path: /metrics/master/prometheus
    static_configs:
      - targets: [spark-master:8080]
  - job_name: spark-worker
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: [spark-worker:8081]

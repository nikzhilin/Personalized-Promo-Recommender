name: personalized-promo-recommender

x-hadoop-common: &hadoop-common
  image: apache/hadoop:3.4.3@sha256:127774dadab40ce84df7ac668a7a8c99945688b3fe336f1388f4477ca33e1529
  profiles: [full]
  restart: unless-stopped
  environment:
    HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    HADOOP_HEAPSIZE_MAX: "256"
  networks: [promo-internal]
  volumes:
    - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
    - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro

x-spark-common: &spark-common
  image: spark:3.5.8-scala2.12-java17-python3-ubuntu@sha256:a71719262ca64125b520ec37e80d8689d1b393d91d4e7733f9740fb4ca5e26ed
  profiles: [full]
  restart: unless-stopped
  environment:
    HADOOP_CONF_DIR: /opt/hadoop-conf
    HADOOP_USER_NAME: promo
    PYTHONPATH: /workspace
  networks: [promo-internal]
  volumes:
    - ./docker/hadoop/core-site.xml:/opt/hadoop-conf/core-site.xml:ro
    - ./docker/hadoop/hdfs-site.xml:/opt/hadoop-conf/hdfs-site.xml:ro
    - ./:/workspace:ro
    - ${RAW_DATA_DIR:-./data/raw}:/data/raw:ro
  working_dir: /workspace

x-airflow-common: &airflow-common
  image: personalized-promo-airflow:local
  build:
    context: ./docker/airflow
    dockerfile: Dockerfile
  profiles: [airflow]
  restart: unless-stopped
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_FOLDER: /workspace/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_HOST: airflow-statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: "9125"
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_CMD: python /workspace/db/airflow_connection.py
    AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW_DB_USER: ${AIRFLOW_DB_USER:-airflow}
    AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:?set AIRFLOW_DB_PASSWORD in .env}
    PROMO_DATABASE_URL: >-
      host=postgres port=5432 dbname=${POSTGRES_DB:-promo_app} user=${POSTGRES_USER:-promo_app}
    PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    WEBHDFS_URL: http://namenode:9870
    HDFS_USER: promo
    HADOOP_CONF_DIR: /opt/hadoop-conf
    HADOOP_USER_NAME: promo
    REDIS_URL: redis://redis:6379/0
    NAMENODE_BACKUP_DIR: /var/backups/namenode
  networks: [promo-internal]
  volumes:
    - ./:/workspace:ro
    - ./docker/hadoop/core-site.xml:/opt/hadoop-conf/core-site.xml:ro
    - ./docker/hadoop/hdfs-site.xml:/opt/hadoop-conf/hdfs-site.xml:ro
    - ${RAW_DATA_DIR:-./data/raw}:/data/raw:ro
    - namenode-backups:/var/backups/namenode
  working_dir: /workspace

services:
  postgres:
    image: postgres:16.4-alpine
    profiles: [full]
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-promo_app}
      POSTGRES_USER: ${POSTGRES_USER:-promo_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    networks: [promo-internal]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4.2-alpine
    profiles: [full]
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 384mb
      - --maxmemory-policy
      - noeviction
    mem_limit: 448m
    networks: [promo-internal]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: personalized-promo-api:local
    build:
      context: ./docker/api
      dockerfile: Dockerfile
    profiles: [full]
    restart: unless-stopped
    mem_limit: 384m
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: promo
      REDIS_CONNECT_TIMEOUT: "0.2"
      REDIS_SOCKET_TIMEOUT: "0.2"
      SNAPSHOT_CACHE_TTL_SECONDS: "30"
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY in .env}
      DATABASE_URL: >-
        host=postgres port=5432 dbname=${POSTGRES_DB:-promo_app} user=${POSTGRES_USER:-promo_app}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks: [promo-internal]
    ports:
      - 127.0.0.1:8000:8000
    volumes:
      - ./:/workspace:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')
      interval: 10s
      timeout: 3s
      retries: 10

  db-migrate:
    image: personalized-promo-api:local
    build:
      context: ./docker/api
      dockerfile: Dockerfile
    profiles: [full]
    restart: "no"
    environment:
      DATABASE_URL: >-
        host=postgres port=5432 dbname=${POSTGRES_DB:-promo_app} user=${POSTGRES_USER:-promo_app}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [promo-internal]
    volumes:
      - ./:/workspace:ro
    command:
      - python
      - -m
      - db.migrate
      - --database-url
      - >-
        host=postgres port=5432 dbname=${POSTGRES_DB:-promo_app} user=${POSTGRES_USER:-promo_app}

  airflow-db-bootstrap:
    image: personalized-promo-api:local
    build:
      context: ./docker/api
      dockerfile: Dockerfile
    profiles: [airflow]
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:?set AIRFLOW_DB_PASSWORD in .env}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [promo-internal]
    volumes:
      - ./:/workspace:ro
    command:
      - python
      - -m
      - db.bootstrap_airflow
      - --admin-database-url
      - >-
        host=postgres port=5432 dbname=postgres user=${POSTGRES_USER:-promo_app}
      - --database-name
      - ${AIRFLOW_DB_NAME:-airflow}
      - --user-name
      - ${AIRFLOW_DB_USER:-airflow}

  airflow-init:
    <<: *airflow-common
    restart: "no"
    depends_on:
      airflow-db-bootstrap:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /workspace/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_CMD: python /workspace/db/airflow_connection.py
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER:-airflow}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:?set AIRFLOW_DB_PASSWORD in .env}
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?set AIRFLOW_ADMIN_PASSWORD in .env}
      PROMO_DATABASE_URL: >-
        host=postgres port=5432 dbname=${POSTGRES_DB:-promo_app} user=${POSTGRES_USER:-promo_app}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      WEBHDFS_URL: http://namenode:9870
      HDFS_USER: promo
    command:
      - /bin/bash
      - -eu
      - -c
      - |
        airflow db migrate
        airflow pools set heavy_compute 1 "Serial Spark and CatBoost work"
        airflow users list | grep -q "$${AIRFLOW_ADMIN_USERNAME}" || airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Promo --lastname Admin --role Admin \
          --email admin@example.invalid

  airflow-webserver:
    <<: *airflow-common
    command: [airflow, webserver]
    mem_limit: 768m
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - 127.0.0.1:8080:8080
    healthcheck:
      test: [CMD-SHELL, "curl --fail --silent http://localhost:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  airflow-scheduler:
    <<: *airflow-common
    command: [airflow, scheduler]
    mem_limit: 768m
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      namenode:
        condition: service_healthy

  airflow-cli:
    <<: *airflow-common
    profiles: [airflow]
    restart: "no"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      namenode:
        condition: service_healthy

  hdfs-volume-init:
    <<: *hadoop-common
    restart: "no"
    user: "0:0"
    command:
      - /bin/bash
      - -eu
      - -c
      - |
        mkdir -p /hadoop/dfs/name /hadoop/dfs/data-1 /hadoop/dfs/data-2
        chown -R hadoop:hadoop /hadoop/dfs
    volumes:
      - hdfs-namenode:/hadoop/dfs/name
      - hdfs-datanode-1:/hadoop/dfs/data-1
      - hdfs-datanode-2:/hadoop/dfs/data-2

  namenode:
    <<: *hadoop-common
    hostname: namenode
    depends_on:
      hdfs-volume-init:
        condition: service_completed_successfully
    command: [/bin/bash, /opt/promo/start-namenode.sh]
    mem_limit: 512m
    healthcheck:
      test: [CMD-SHELL, "hdfs dfsadmin -safemode get >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./docker/hadoop/start-namenode.sh:/opt/promo/start-namenode.sh:ro
      - hdfs-namenode:/hadoop/dfs/name

  datanode-1:
    <<: *hadoop-common
    hostname: datanode-1
    depends_on:
      namenode:
        condition: service_healthy
    command: [hdfs, datanode]
    mem_limit: 512m
    healthcheck:
      test: [CMD-SHELL, "curl --fail --silent http://localhost:9864/jmx >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - hdfs-datanode-1:/hadoop/dfs/data

  datanode-2:
    <<: *hadoop-common
    hostname: datanode-2
    depends_on:
      namenode:
        condition: service_healthy
    command: [hdfs, datanode]
    mem_limit: 512m
    healthcheck:
      test: [CMD-SHELL, "curl --fail --silent http://localhost:9864/jmx >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - hdfs-datanode-2:/hadoop/dfs/data

  spark-master:
    <<: *spark-common
    hostname: spark-master
    command: [/opt/spark/bin/spark-class, org.apache.spark.deploy.master.Master]
    mem_limit: 384m
    environment:
      HADOOP_CONF_DIR: /opt/hadoop-conf
      HADOOP_USER_NAME: promo
      PYTHONPATH: /workspace
      SPARK_DAEMON_MEMORY: 256m
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    healthcheck:
      test: [CMD-SHELL, "bash -c '</dev/tcp/spark-master/7077'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  spark-worker:
    <<: *spark-common
    image: personalized-promo-trainer:local
    build:
      context: ./docker/training
      dockerfile: Dockerfile
    hostname: spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
      namenode:
        condition: service_healthy
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    mem_limit: 2g
    environment:
      HADOOP_CONF_DIR: /opt/hadoop-conf
      HADOOP_USER_NAME: promo
      PYTHONPATH: /workspace
      SPARK_DAEMON_MEMORY: 256m
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: 1536m
      SPARK_WORKER_WEBUI_PORT: "8081"

  spark-submit:
    <<: *spark-common
    image: personalized-promo-trainer:local
    build:
      context: ./docker/training
      dockerfile: Dockerfile
    profiles: [tools]
    restart: "no"
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started
      namenode:
        condition: service_healthy

  trainer:
    <<: *spark-common
    image: personalized-promo-trainer:local
    build:
      context: ./docker/training
      dockerfile: Dockerfile
    profiles: [tools]
    restart: "no"
    mem_limit: 2500m
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started
      namenode:
        condition: service_healthy

  publisher:
    <<: *spark-common
    image: personalized-promo-trainer:local
    build:
      context: ./docker/training
      dockerfile: Dockerfile
    profiles: [tools]
    restart: "no"
    mem_limit: 2500m
    environment:
      HADOOP_CONF_DIR: /opt/hadoop-conf
      HADOOP_USER_NAME: promo
      PYTHONPATH: /workspace
      DATABASE_URL: >-
        host=postgres port=5432 dbname=${POSTGRES_DB:-promo_app} user=${POSTGRES_USER:-promo_app}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started
      namenode:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  pipeline-metrics:
    image: personalized-promo-api:local
    build:
      context: ./docker/api
      dockerfile: Dockerfile
    profiles: [full, monitoring]
    restart: unless-stopped
    mem_limit: 128m
    environment:
      DATABASE_URL: >-
        host=postgres port=5432 dbname=${POSTGRES_DB:-promo_app} user=${POSTGRES_USER:-promo_app}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    command:
      - python
      - -m
      - services.monitoring.exporter
      - --database-url
      - >-
        host=postgres port=5432 dbname=${POSTGRES_DB:-promo_app} user=${POSTGRES_USER:-promo_app}
    networks: [promo-internal]
    volumes:
      - ./:/workspace:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  airflow-statsd-exporter:
    image: prom/statsd-exporter:v0.28.0
    profiles: [full, monitoring]
    restart: unless-stopped
    mem_limit: 96m
    networks: [promo-internal]

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    profiles: [full, monitoring]
    restart: unless-stopped
    mem_limit: 64m
    environment:
      REDIS_ADDR: redis://redis:6379
    networks: [promo-internal]
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.0.1
    profiles: [full, monitoring]
    restart: unless-stopped
    mem_limit: 256m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    networks: [promo-internal]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - api
      - pipeline-metrics

  grafana:
    image: grafana/grafana:11.4.0
    profiles: [full, monitoring]
    restart: unless-stopped
    mem_limit: 320m
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks: [promo-internal]
    ports:
      - 127.0.0.1:3000:3000
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  promo-internal:
    internal: true

volumes:
  hdfs-namenode:
  hdfs-datanode-1:
  hdfs-datanode-2:
  postgres-data:
  namenode-backups:
  prometheus-data:
  grafana-data:
